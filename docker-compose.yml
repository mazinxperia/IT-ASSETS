version: '3.8'

services:
  # MongoDB (for local development/testing)
  mongodb:
    image: mongo:7
    container_name: assetflow-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=assetflow
    networks:
      - assetflow-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: assetflow-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - DB_NAME=assetflow
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-key}
      - CORS_ORIGINS=http://localhost:3000,http://localhost
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - assetflow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=http://localhost:8001
    container_name: assetflow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - assetflow-network

volumes:
  mongodb_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  assetflow-network:
    driver: bridge
